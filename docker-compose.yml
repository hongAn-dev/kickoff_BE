version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: kickoff_postgres
    environment:
      POSTGRES_USER: kickoff_user
      POSTGRES_PASSWORD: kickoff_password
      POSTGRES_DB: kickoff_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: unless-stopped

volumes:
  postgres_data:
